<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/pink_ghost_icon.png" />
    <link rel="apple-touch-icon" href="/icons/pink_ghost_icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Upendo" />
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' https://accounts.google.com https://csp.withgoogle.com https://cdn.onesignal.com https://api.onesignal.com; object-src 'self'">
    <link rel="manifest" href="/manifest.json" />
    <title>Upendo | The No Ghost Dating App</title>
    <script type="module">
      if (import.meta.hot?.on) {
        import.meta.hot.on('vite:error', (error) => {
          if (error.err) {
            console.error(
              [error.err.message, error.err.frame].filter(Boolean).join('\n'),
            )
          }
        })
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="modal-portal"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
