<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upendo | The No Ghost Dating App</title>
    <script type="module">
      if (import.meta.hot?.on) {
        import.meta.hot.on('vite:error', (error) => {
          if (error.err) {
            console.error(
              [error.err.message, error.err.frame].filter(Boolean).join('\n'),
            )
          }
        })
      }
    </script>
  </head>
  <body>
    <!-- SEO Content for Google OAuth Verification - Visible to crawlers but hidden from users -->
    <h1 style="position:absolute;left:-9999px;">Upendo</h1>
    <p style="position:absolute;left:-9999px;">Upendo is the no-ghost dating app</p>
    
    <div id="root"></div>
    <div id="modal-portal"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
